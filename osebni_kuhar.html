<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fit Lab — Osebni kuhar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0e;
    --surface: #1a1a18;
    --surface2: #232320;
    --border: #2e2e2a;
    --accent: #c8f060;
    --accent2: #60f0a8;
    --text: #f0ede6;
    --text2: #b8b5a8;
    --text3: #888070;
    --blue: #60c8f0;
    --coral: #f09060;
    --purple: #a080f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 64px;
  }

  .wrap { max-width: 560px; margin: 0 auto; }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 { font-size: 26px; font-weight: 500; margin-bottom: 6px; }
  h1 span { color: var(--accent); }

  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

  /* Macro input */
  .macro-input {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .macro-input-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 14px;
  }

  .macro-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .macro-field label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .macro-field input {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  .macro-field input::-webkit-outer-spin-button,
  .macro-field input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .macro-field input:focus { border-color: var(--accent); }

  .macro-field .unit {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-left: 4px;
  }

  .search-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0f0f0e;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .search-btn:hover { background: #d4f570; transform: translateY(-1px); }

  /* Filter tabs */
  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200, 240, 96, 0.08);
  }

  /* Recipe cards */
  .recipes-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .recipe-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.15s;
  }

  .recipe-card:hover { border-color: var(--text3); transform: translateY(-1px); }

  .recipe-header {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .recipe-emoji {
    font-size: 32px;
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border-radius: 10px;
  }

  .recipe-info { flex: 1; }

  .recipe-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }

  .recipe-sub {
    font-size: 12px;
    color: var(--text2);
  }

  .recipe-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }

  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }

  .tag-quick { background: rgba(200, 240, 96, 0.1); color: var(--accent); }
  .tag-protein { background: rgba(96, 200, 240, 0.1); color: var(--blue); }
  .tag-sweet { background: rgba(160, 128, 240, 0.1); color: var(--purple); }
  .tag-savory { background: rgba(240, 144, 96, 0.1); color: var(--coral); }

  .recipe-macros {
    display: flex;
    gap: 0;
    border-top: 0.5px solid var(--border);
  }

  .macro-pill {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-right: 0.5px solid var(--border);
  }

  .macro-pill:last-child { border-right: none; }

  .macro-pill-val {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    display: block;
  }

  .macro-pill-label {
    font-size: 10px;
    color: var(--text3);
  }

  .match-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(200, 240, 96, 0.06);
    border-top: 0.5px solid rgba(200, 240, 96, 0.2);
    font-size: 12px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  .match-indicator.show { display: flex; }

  /* Recipe detail modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 20px;
  }

  .modal-emoji {
    font-size: 40px;
    flex-shrink: 0;
  }

  .modal-title { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text2); }

  .modal-macros {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 20px;
  }

  .modal-macro {
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }

  .modal-macro-val {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    display: block;
    margin-bottom: 2px;
  }

  .modal-macro-label { font-size: 10px; color: var(--text3); }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .ingredient-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 14px;
  }

  .ingredient-row:last-child { border-bottom: none; }

  .ingredient-name { color: var(--text2); }

  .ingredient-amount {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-weight: 500;
  }

  .steps-list { list-style: none; }

  .step-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  .step-item:last-child { border-bottom: none; }

  .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(200, 240, 96, 0.1);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .tip-box {
    background: rgba(200, 240, 96, 0.05);
    border: 0.5px solid rgba(200, 240, 96, 0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    margin-top: 16px;
  }

  .tip-box strong { color: var(--accent); }

  .close-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 20px;
  }

  .adjusted-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(200, 240, 96, 0.1);
    border: 0.5px solid rgba(200, 240, 96, 0.3);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
  }

  .divider { height: 0.5px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">Fit Lab — Osebni kuhar</div>
  <h1>Tvoj <span>osebni kuhar</span></h1>
  <p class="subtitle">Vpiši koliko kalorij in makrov ti še ostane — samodejno prilagodim recept in količine sestavin.</p>

  <!-- Macro input -->
  <div class="macro-input">
    <div class="macro-input-title">Koliko ti še ostane do konca dneva?</div>
    <div class="macro-fields">

        <label>Kalorije <span class="unit">kcal</span></label>
        <input type="number" id="in-kcal" placeholder="450">
      </div>
      <div class="macro-field">
        <label>Beljakovine <span class="unit">g</span></label>
        <input type="number" id="in-prot" placeholder="30">
      </div>
      <div class="macro-field">
        <label>Ogljikovi hidrati <span class="unit">g</span></label>
        <input type="number" id="in-carbs" placeholder="50">
      </div>
      <div class="macro-field">
        <label>Maščobe <span class="unit">g</span></label>
        <input type="number" id="in-fat" placeholder="15">
      </div>
    </div>
    <button class="search-btn" onclick="findRecipes()">Poišči recepte →</button>
  </div>

  <!-- Filter -->
  <div class="filter-row">
    <div class="filter-btn active" onclick="filterCat('vse', this)">Vse</div>
    <div class="filter-btn" onclick="filterCat('sladko', this)">🍌 Sladko</div>
    <div class="filter-btn" onclick="filterCat('slano', this)">🌯 Slano</div>
    <div class="filter-btn" onclick="filterCat('hitro', this)">⚡ Hitro</div>
    <div class="filter-btn" onclick="filterCat('protein', this)">💪 Visoko beljakovinski</div>
  </div>

  <!-- Legend -->
  <div style="display:flex;gap:12px;margin-bottom:14px;font-size:12px;color:var(--text3);">
    <span>🟢 20g+ beljakovin</span>
    <span>🟡 12-20g</span>
    <span>🔴 manj kot 12g</span>
  </div>

  <!-- Recipes -->
  <div class="recipes-grid" id="recipes-grid"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

let currentFilter = 'vse';
let targetMacros = null;
let openRecipeId = null;

function filterCat(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRecipes();
}

const countableItems = ['jajca', 'jajce', 'tortila', 'tortile', 'riževi kolački', 'rižev kolacek'];

function roundIngredient(ing, scale) {
  const raw = ing.amount * scale;
  const isCountable = ing.unit === 'kos' || countableItems.some(c => ing.name.toLowerCase().includes(c));
  if (isCountable) return Math.max(1, Math.ceil(raw)) + ' ' + ing.unit;
  if (ing.unit === 'ml' || ing.unit === 'g') return Math.max(5, Math.round(raw / 5) * 5) + ' ' + ing.unit;
  return Math.max(1, Math.round(raw)) + ' ' + ing.unit;
}

function getScaleFactor(recipe) {
  if (!targetMacros) return 1;
  const { kcal, prot, carbs, fat } = targetMacros;

  // 1. KALORIJE so prioriteta — vedno skaliramo na kcal
  let scale = 1;
  if (kcal > 0) {
    scale = kcal / recipe.base.kcal;
  } else {
    // Če ni kcal, uporabi makre kot vodilo
    const factors = [];
    if (prot > 0) factors.push(prot / recipe.base.prot);
    if (carbs > 0) factors.push(carbs / recipe.base.carbs);
    if (fat > 0) factors.push(fat / recipe.base.fat);
    if (factors.length > 0) {
      factors.sort((a, b) => a - b);
      scale = factors[Math.floor(factors.length / 2)];
    }
  }

  // 2. Omeji na razumno območje (30% - 300% osnovne porcije)
  return Math.max(0.3, Math.min(6, scale));
}

function getMatchScore(recipe) {
  if (!targetMacros) return 100;
  const scale = getScaleFactor(recipe);
  const scaled = {
    kcal: recipe.base.kcal * scale,
    prot: recipe.base.prot * scale,
    carbs: recipe.base.carbs * scale,
    fat: recipe.base.fat * scale,
  };

  let score = 100;
  // Kalorije so najpomembnejše (50% teže)
  if (targetMacros.kcal > 0) {
    const kcalDiff = Math.abs(scaled.kcal - targetMacros.kcal) / targetMacros.kcal;
    score -= kcalDiff * 50;
  }
  // Beljakovine so drugi prioriteta (30% teže)
  if (targetMacros.prot > 0) {
    const protDiff = Math.abs(scaled.prot - targetMacros.prot) / targetMacros.prot;
    score -= protDiff * 30;
  }
  // OH in maščobe so manj pomembni (10% vsak)
  if (targetMacros.carbs > 0) {
    const carbsDiff = Math.abs(scaled.carbs - targetMacros.carbs) / targetMacros.carbs;
    score -= carbsDiff * 10;
  }
  if (targetMacros.fat > 0) {
    const fatDiff = Math.abs(scaled.fat - targetMacros.fat) / targetMacros.fat;
    score -= fatDiff * 10;
  }
  return Math.max(0, Math.round(score));
}

function getWarning(recipe) {
  if (!targetMacros) return null;
  const scale = getScaleFactor(recipe);
  const scaled = { prot: recipe.base.prot * scale };
  const warnings = [];
  if (scale < 0.4) warnings.push("Zelo majhna porcija za te kalorije.");
  if (scale > 2.5) warnings.push("Zelo velika porcija — prilagojena na maksimum.");
  if (targetMacros.prot > 0 && scaled.prot < targetMacros.prot * 0.6) {
    warnings.push(`Pri ${Math.round(targetMacros.kcal || recipe.base.kcal * scale)} kcal ta recept da le ${Math.round(scaled.prot)}g beljakovin — izberi 🟢 visoko beljakovinski recept.`);
  }
  return warnings.length > 0 ? '⚠️ ' + warnings.join(' ') : null;
}

function getMatchScore(recipe) {
  if (!targetMacros) return 100;
  const scale = getScaleFactor(recipe);
  const scaled = {
    kcal: recipe.base.kcal * scale,
    prot: recipe.base.prot * scale,
    carbs: recipe.base.carbs * scale,
    fat: recipe.base.fat * scale,
  };
  let score = 100;
  if (targetMacros.kcal > 0) score -= Math.abs(scaled.kcal - targetMacros.kcal) / targetMacros.kcal * 30;
  if (targetMacros.prot > 0) score -= Math.abs(scaled.prot - targetMacros.prot) / targetMacros.prot * 30;
  return Math.max(0, Math.round(score));
}

function findRecipes() {
  const kcal = parseFloat(document.getElementById('in-kcal').value) || 0;
  const prot = parseFloat(document.getElementById('in-prot').value) || 0;
  const carbs = parseFloat(document.getElementById('in-carbs').value) || 0;
  const fat = parseFloat(document.getElementById('in-fat').value) || 0;
  if (kcal === 0 && prot === 0 && carbs === 0 && fat === 0) {
    targetMacros = null;
  } else {
    targetMacros = { kcal, prot, carbs, fat };
  }
  renderRecipes();
}

function renderRecipes() {
  const grid = document.getElementById('recipes-grid');
  let filtered = currentFilter === 'vse' ? recipes :
    currentFilter === 'protein' ? recipes.filter(r => (r.base.prot * 4 / r.base.kcal * 100) >= 25) :
    recipes.filter(r => r.cat.includes(currentFilter));
  if (targetMacros) {
    filtered = [...filtered].sort((a, b) => getMatchScore(b) - getMatchScore(a));
  }
  grid.innerHTML = '';
  filtered.forEach(recipe => {
    const scale = getScaleFactor(recipe);
    const scaled = {
      kcal: Math.round(recipe.base.kcal * scale),
      prot: Math.round(recipe.base.prot * scale),
      carbs: Math.round(recipe.base.carbs * scale),
      fat: Math.round(recipe.base.fat * scale),
    };
    const match = getMatchScore(recipe);
    const isAdjusted = targetMacros && Math.abs(scale - 1) > 0.05;
    const tagMap = { protein: ['tag-protein', 'Visoko beljakovinski'], quick: ['tag-quick', 'Hitro'], sweet: ['tag-sweet', 'Sladko'], savory: ['tag-savory', 'Slano'] };
    const tagsHtml = recipe.tags.map(t => `<span class="tag ${tagMap[t][0]}">${tagMap[t][1]}</span>`).join('');
    // Protein badge
    const protBadge = scaled.prot >= 20 ? '🟢' : scaled.prot >= 12 ? '🟡' : '🔴';
    // Warning if protein goal unreachable
    const maxProt = recipe.base.prot * 3;
    const protWarn = (targetMacros && targetMacros.prot > 0 && targetMacros.prot > maxProt) 
      ? `<div style="font-size:11px;color:var(--coral);margin-top:4px;">⚠️ Max ${Math.round(maxProt)}g beljakovin pri razumni porciji</div>` : '';
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      <div class="recipe-header">
        <div class="recipe-emoji">${recipe.emoji}</div>
        <div class="recipe-info">
          <div class="recipe-name">${protBadge} ${recipe.name}</div>
          <div class="recipe-sub">⏱ ${recipe.time}</div>
          <div class="recipe-tags">${tagsHtml}</div>
          ${protWarn}
        </div>
      </div>
      <div class="recipe-macros">
        <div class="macro-pill"><span class="macro-pill-val">${scaled.kcal}</span><span class="macro-pill-label">kcal</span></div>
        <div class="macro-pill"><span class="macro-pill-val" style="color:var(--accent)">${scaled.prot}g</span><span class="macro-pill-label">belj.</span></div>
        <div class="macro-pill"><span class="macro-pill-val" style="color:var(--blue)">${scaled.carbs}g</span><span class="macro-pill-label">oh</span></div>
        <div class="macro-pill"><span class="macro-pill-val" style="color:var(--accent2)">${scaled.fat}g</span><span class="macro-pill-label">maš.</span></div>
      </div>
      ${targetMacros ? `<div class="match-indicator show">✓ ${match}% ujemanje • ${isAdjusted ? 'količine prilagojene' : 'osnovna porcija'}</div>` : ''}
    `;
    card.onclick = () => openRecipe(recipe.id);
    grid.appendChild(card);
  });
}

function openRecipe(id) {
  const recipe = recipes.find(r => r.id === id);
  openRecipeId = id;
  const scale = getScaleFactor(recipe);
  const scaled = {
    kcal: Math.round(recipe.base.kcal * scale),
    prot: Math.round(recipe.base.prot * scale),
    carbs: Math.round(recipe.base.carbs * scale),
    fat: Math.round(recipe.base.fat * scale),
  };
  const isAdjusted = targetMacros && Math.abs(scale - 1) > 0.05;
  let ingredientsHtml = recipe.ingredients.map(ing => {
    const amount = roundIngredient(ing, scale);
    return `<div class="ingredient-row"><span class="ingredient-name">${ing.name}</span><span class="ingredient-amount">${amount}</span></div>`;
  }).join('');
  
  const warning = getWarning(recipe);
  const warningHtml = warning ? `<div style="background:rgba(240,144,96,0.08);border:0.5px solid rgba(240,144,96,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--coral);margin-bottom:14px;">${warning}</div>` : '';
  let stepsHtml = recipe.steps.map((s, i) => `<li class="step-item"><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('');
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-header">
      <div class="modal-emoji">${recipe.emoji}</div>
      <div>
        <div class="modal-title">${recipe.name}</div>
        <div class="modal-sub">⏱ ${recipe.time}</div>
      </div>
    </div>
    ${isAdjusted ? `<div class="adjusted-badge">⚡ Količine prilagojene tvojim makrom</div>` : ''}
    ${warningHtml}
    <div class="modal-macros">
      <div class="modal-macro"><span class="modal-macro-val">${scaled.kcal}</span><span class="modal-macro-label">kcal</span></div>
      <div class="modal-macro"><span class="modal-macro-val" style="color:var(--accent)">${scaled.prot}g</span><span class="modal-macro-label">belj.</span></div>
      <div class="modal-macro"><span class="modal-macro-val" style="color:var(--blue)">${scaled.carbs}g</span><span class="modal-macro-label">OH</span></div>
      <div class="modal-macro"><span class="modal-macro-val" style="color:var(--accent2)">${scaled.fat}g</span><span class="modal-macro-label">maš.</span></div>
    </div>
    <div class="divider"></div>
    <div class="section-title" style="margin-bottom:10px">Sestavine</div>
    ${ingredientsHtml}
    <div class="divider"></div>
    <div class="section-title" style="margin-bottom:10px">Postopek</div>
    <ul class="steps-list">${stepsHtml}</ul>
    <div class="tip-box"><strong>💡 Pro tip:</strong> ${recipe.tip}<br><br><strong>Zakaj je to zdravo:</strong> ${recipe.why}</div>
    <button class="close-btn" onclick="closeModal()">Zapri ✕</button>
  `;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = '';
  }
}

renderRecipes();
</script>
</body>
</html>
