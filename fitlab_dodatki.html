<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fit Lab — Dodatki</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0e;--s1:#1a1a18;--s2:#232320;--b:#2e2e2a;
  --ac:#c8f060;--ac2:#60f0a8;--txt:#f0ede6;--t2:#b8b5a8;--t3:#888070;
  --blue:#60c8f0;--coral:#f09060;--red:#f06060;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px 16px 80px}
.wrap{max-width:520px;margin:0 auto}

.logo{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

h1{font-size:26px;font-weight:500;margin-bottom:6px}
h1 span{color:var(--ac)}
.sub{font-size:13px;color:var(--t2);margin-bottom:22px;line-height:1.6}

/* Tabs */
.tabs{display:flex;gap:0;background:var(--s1);border:.5px solid var(--b);border-radius:10px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:9px 6px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s;color:var(--t3);user-select:none;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.active-osnovno{background:var(--ac);color:#0f0f0e}
.tab.active-opcijsko{background:#f0c060;color:#0f0f0e}
.tab.active-neuporabno{background:var(--red);color:#fff}

/* Cards */
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:var(--s1);border:.5px solid var(--b);border-radius:14px;overflow:hidden;transition:all .2s}

.card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.card-emoji{font-size:22px;flex-shrink:0;width:36px;text-align:center;margin-top:1px}
.card-info{flex:1}
.card-name{font-size:15px;font-weight:500;color:var(--txt);margin-bottom:2px}
.card-purpose{font-size:12px;color:var(--t2)}
.card-badge{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
.badge-yes{background:rgba(200,240,96,.1);color:var(--ac);border:.5px solid rgba(200,240,96,.3)}
.badge-maybe{background:rgba(240,192,96,.1);color:#f0c060;border:.5px solid rgba(240,192,96,.3)}
.badge-no{background:rgba(240,96,96,.1);color:var(--red);border:.5px solid rgba(240,96,96,.3)}

.card-body{display:none;padding:0 16px 14px;border-top:.5px solid var(--b);margin-top:0}
.card-body.open{display:block}

.info-row{display:flex;gap:8px;padding:8px 0;border-bottom:.5px solid var(--b);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-icon{font-size:14px;flex-shrink:0;width:20px}
.info-label{color:var(--t3);min-width:80px;flex-shrink:0;font-size:12px}
.info-val{color:var(--t2);flex:1;line-height:1.4}
.info-val strong{color:var(--txt)}

.effectiveness-bar{display:flex;gap:3px;margin-top:4px}
.eff-dot{width:18px;height:6px;border-radius:3px;background:var(--s2)}
.eff-dot.filled-green{background:var(--ac)}
.eff-dot.filled-yellow{background:#f0c060}
.eff-dot.filled-red{background:var(--red)}

.tip-box{background:rgba(200,240,96,.05);border:.5px solid rgba(200,240,96,.15);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--t2);line-height:1.5;margin-top:10px}
.tip-box strong{color:var(--ac)}

.chevron{font-size:12px;color:var(--t3);margin-top:2px;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}

.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:14px}
</style>
</head>
<body>
<div class="wrap">

<div class="logo"><div class="dot"></div>Fit Lab — Dodatki</div>
<h1>Kateri dodatki <span>res delajo</span></h1>
<p class="sub">Izberi kategorijo — vsak dodatek ocenjen po učinkovitosti, namenu in ceni. Brez marketinškega BS-a.</p>

<div class="tabs" style="flex-wrap:wrap;gap:4px">
  <div class="tab active-osnovno" onclick="switchTab('osnovno',this)" id="tab-osnovno" style="min-width:calc(50% - 4px)">✅ Osnovno</div>
  <div class="tab" onclick="switchTab('opcijsko',this)" id="tab-opcijsko" style="min-width:calc(50% - 4px)">🟡 Opcijsko</div>
  <div class="tab" onclick="switchTab('performance',this)" id="tab-performance" style="min-width:calc(50% - 4px)">⚡ Performance</div>
  <div class="tab" onclick="switchTab('neuporabno',this)" id="tab-neuporabno" style="min-width:calc(50% - 4px)">❌ Neuporabno</div>
</div>

<div class="cards" id="cards-container"></div>

</div>

let currentTab = 'osnovno';
let openCards = new Set();

function switchTab(tab, el) {
  currentTab = tab;
  openCards.clear();
  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab';
  });
  const activeClass = tab === 'performance' ? 'active-osnovno' : `active-${tab}`;
  el.classList.add(activeClass);
  renderCards();
}

function toggleCard(idx) {
  if (openCards.has(idx)) {
    openCards.clear();
  } else {
    openCards.clear();
    openCards.add(idx);
  }
  renderCards();
}

function renderEffectiveness(level, color) {
  let dots = '';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= level ? `filled-${color}` : '';
    dots += `<div class="eff-dot ${filled}"></div>`;
  }
  return `<div class="effectiveness-bar">${dots}</div>`;
}

function renderCards() {
  const items = supplements[currentTab];
  const container = document.getElementById('cards-container');

  if (!items || items.length === 0) {
    container.innerHTML = '<div class="empty">Ni dodatkov v tej kategoriji.</div>';
    return;
  }

  container.innerHTML = items.map((s, i) => {
    const isOpen = openCards.has(i);
    return `
      <div class="card">
        <div class="card-header" onclick="toggleCard(${i})">
          <div class="card-emoji">${s.emoji}</div>
          <div class="card-info">
            <div class="card-name">${s.name}</div>
            <div class="card-purpose">${s.purpose}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="card-badge ${s.badgeClass}">${s.badge}</div>
            <div class="chevron ${isOpen ? 'open' : ''}">▼</div>
          </div>
        </div>
        <div class="card-body ${isOpen ? 'open' : ''}">
          <div style="padding-top:12px">
            <div class="info-row">
              <span class="info-icon">📊</span>
              <span class="info-label">Učinkovitost</span>
              <span class="info-val">${renderEffectiveness(s.effectiveness, s.effectivenessColor)}</span>
            </div>
            ${s.when !== '—' ? `
            <div class="info-row">
              <span class="info-icon">⏰</span>
              <span class="info-label">Kdaj vzeti</span>
              <span class="info-val">${s.when}</span>
            </div>` : ''}
            ${s.dose !== '—' ? `
            <div class="info-row">
              <span class="info-icon">⚖️</span>
              <span class="info-label">Odmerek</span>
              <span class="info-val"><strong>${s.dose}</strong></span>
            </div>` : ''}
            <div class="info-row">
              <span class="info-icon">💶</span>
              <span class="info-label">Cena</span>
              <span class="info-val">${s.price}</span>
            </div>
            <div class="info-row">
              <span class="info-icon">📖</span>
              <span class="info-label">Zakaj</span>
              <span class="info-val">${s.note}</span>
            </div>
            <div class="tip-box">${s.tip}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

renderCards();

</html>
